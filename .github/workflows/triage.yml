name: Auto Triage

permissions:
  issues: write

on:
  issues:
    types: [opened, edited]

jobs:
  triage:
    runs-on: ubuntu-latest

    steps:
      - name: Assign priority + ready
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";

            let priority = "P3";

            if (body.includes("High")) priority = "P1";
            else if (body.includes("Medium")) priority = "P2";

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [priority, "ready"]
            });

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: "needs-triage"
              });
            } catch (e) {}
