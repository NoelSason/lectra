openapi: 3.1.0
info:
  title: DropBridge Edge Functions API
  version: 1.3.0
  description: >-
    Contract for v1 pairing flows, v2 account-linked queueing, and Lectra wake hints for Canvascope delivery.
servers:
  - url: https://{projectRef}.supabase.co
    variables:
      projectRef:
        default: your_project_ref
components:
  securitySchemes:
    apikeyHeader:
      type: apiKey
      in: header
      name: apikey
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    DropBridgeClientKind:
      type: string
      enum: [canvascope_extension, lectra_ipad]
    DropBridgePushEnvironment:
      type: string
      enum: [sandbox, production]
    RegisterDeviceRequest:
      type: object
      required: [deviceId, deviceToken]
      properties:
        deviceId:
          type: string
          format: uuid
        deviceToken:
          type: string
          minLength: 32
        deviceName:
          type: string
          maxLength: 64
    RegisterDeviceResponse:
      type: object
      properties:
        ok:
          type: boolean
        deviceId:
          type: string
          format: uuid
        deviceName:
          type: string
    UploadResponse:
      type: object
      properties:
        ok:
          type: boolean
        uploadId:
          type: string
          format: uuid
        fileName:
          type: string
        sizeBytes:
          type: integer
        contentType:
          type: string
    PendingRequest:
      type: object
      required: [deviceId, deviceToken]
      properties:
        deviceId:
          type: string
          format: uuid
        deviceToken:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 10
    PendingUpload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        mimeType:
          type: string
          nullable: true
        sizeBytes:
          type: integer
        createdAt:
          type: string
          format: date-time
        downloadUrl:
          type: string
          format: uri
    PendingResponse:
      type: object
      properties:
        ok:
          type: boolean
        uploads:
          type: array
          items:
            $ref: '#/components/schemas/PendingUpload'
    StatusUpdateRequest:
      type: object
      required: [deviceId, deviceToken, uploadId, status]
      properties:
        deviceId:
          type: string
          format: uuid
        deviceToken:
          type: string
        uploadId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, downloaded, canceled]

    RegisterDeviceV2Request:
      type: object
      required: [deviceId]
      properties:
        deviceId:
          type: string
          format: uuid
        deviceName:
          type: string
          maxLength: 64
        clientKind:
          $ref: '#/components/schemas/DropBridgeClientKind'
        pushToken:
          type: string
          nullable: true
        pushEnvironment:
          anyOf:
            - $ref: '#/components/schemas/DropBridgePushEnvironment'
            - type: 'null'
    RegisterDeviceV2Response:
      type: object
      properties:
        ok:
          type: boolean
        deviceId:
          type: string
          format: uuid
        deviceName:
          type: string
        userId:
          type: string
          format: uuid
        lastSeenAt:
          type: string
          format: date-time
        pushTokenUpdatedAt:
          type: string
          format: date-time
          nullable: true
        pushEnvironment:
          anyOf:
            - $ref: '#/components/schemas/DropBridgePushEnvironment'
            - type: 'null'
    UploadV2Response:
      type: object
      properties:
        ok:
          type: boolean
        uploadId:
          type: string
          format: uuid
        fileName:
          type: string
        sizeBytes:
          type: integer
        contentType:
          type: string
        receiverId:
          type: string
          format: uuid
        expiresAt:
          type: string
          format: date-time
    PendingV2Request:
      type: object
      required: [deviceId]
      properties:
        deviceId:
          type: string
          format: uuid
        limit:
          type: integer
          minimum: 1
          maximum: 10
    PendingV2Upload:
      type: object
      properties:
        id:
          type: string
          format: uuid
        uploadId:
          type: string
          format: uuid
        fileName:
          type: string
        mimeType:
          type: string
          nullable: true
        sizeBytes:
          type: integer
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        downloadUrl:
          type: string
          format: uri
    PendingV2Response:
      type: object
      properties:
        ok:
          type: boolean
        uploads:
          type: array
          items:
            $ref: '#/components/schemas/PendingV2Upload'
    StatusUpdateV2Request:
      type: object
      required: [deviceId, uploadId, status]
      properties:
        deviceId:
          type: string
          format: uuid
        uploadId:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, downloaded, canceled]
        clientKind:
          $ref: '#/components/schemas/DropBridgeClientKind'

    WakeLectraV2Request:
      type: object
      required: [syncedItemId]
      properties:
        syncedItemId:
          type: string
          format: uuid
        reason:
          type: string
    WakeLectraV2Response:
      type: object
      properties:
        ok:
          type: boolean
        deviceId:
          type: string
          format: uuid
          nullable: true
        realtimeBroadcasted:
          type: boolean
        apnsAttempted:
          type: boolean
        apnsReason:
          type: string
          nullable: true

    GenericError:
      type: object
      properties:
        error:
          type: string
security:
  - apikeyHeader: []
    bearerAuth: []
paths:
  /functions/v1/register-device:
    post:
      summary: Register or refresh a receiver device (v1 pairing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceRequest'
      responses:
        '200':
          description: Device registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceResponse'
        '409':
          description: Device exists with different token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
  /functions/v1/upload-file:
    post:
      summary: Upload file from iOS app into private bucket and queue row (v1 pairing)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [deviceId, deviceToken, file]
              properties:
                deviceId:
                  type: string
                  format: uuid
                deviceToken:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadResponse'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
  /functions/v1/list-pending:
    post:
      summary: Claim queued items and return signed URLs for extension (v1 pairing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PendingRequest'
      responses:
        '200':
          description: Pending list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingResponse'
  /functions/v1/update-upload-status:
    post:
      summary: Mark queue item state from extension (v1 pairing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  uploadId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [queued, downloaded, canceled]
        '404':
          description: Upload not found for device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /functions/v1/register-device-v2:
    post:
      summary: Register an account-linked receiver device for Canvascope or Lectra (v2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDeviceV2Request'
      responses:
        '200':
          description: Device registered for account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterDeviceV2Response'
        '401':
          description: Missing or invalid user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /functions/v1/upload-file-v2:
    post:
      summary: Upload file from Lectra and route to most-recent receiver (v2)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: File queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadV2Response'
        '404':
          description: No active receiver for user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '413':
          description: File too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /functions/v1/list-pending-v2:
    post:
      summary: Claim queued uploads for receiver device under user account (v2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PendingV2Request'
      responses:
        '200':
          description: Pending list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingV2Response'
        '403':
          description: Device does not belong to user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /functions/v1/update-upload-status-v2:
    post:
      summary: Mark queue item state from extension (v2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateV2Request'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  uploadId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [queued, downloaded, canceled]
        '404':
          description: Upload not found for device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /functions/v1/wake-lectra-v2:
    post:
      summary: Send a best-effort Realtime/APNs wake hint to Lectra after canonical sync writes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WakeLectraV2Request'
      responses:
        '200':
          description: Wake hint result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WakeLectraV2Response'
        '401':
          description: Missing or invalid user session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
        '404':
          description: Synced item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'

  /functions/v1/cleanup-expired-uploads:
    post:
      summary: Cancel and clean up expired queue entries (service role only)
      responses:
        '200':
          description: Cleanup summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  canceledCount:
                    type: integer
                  removedObjectCount:
                    type: integer
        '403':
          description: Service-role authorization required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericError'
