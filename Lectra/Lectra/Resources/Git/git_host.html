<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!--
  git_host.html — runs real git (isomorphic-git) inside a hidden WKWebView.

  Mirrors the Pyodide host pattern: assets are served over the custom
  `lectragit://` scheme (file:// would trip WebKit's fetch/CORS rules), and the
  Swift side drives commands via `window.lectraGit(...)` while results come back
  over `webkit.messageHandlers.lectragit`.

  The novel part vs. Pyodide: git needs a filesystem and a network transport.
  Both are bridged to native Swift so the app sandbox is the single source of
  truth and GitHub requests go through URLSession (no browser CORS wall):
    - fs  -> webkit.messageHandlers.gitfs   (WKScriptMessageHandlerWithReply)
    - http-> webkit.messageHandlers.githttp (WKScriptMessageHandlerWithReply)
-->
<script src="lectragit:///isomorphic-git.umd.min.js"></script>
</head>
<body>
<script>
"use strict";

// isomorphic-git's UMD bundle exports as `git` and bundles its own Buffer/process
// polyfills, so no extra shims are needed in WKWebView.
const git = self.git;

function post(msg) { window.webkit.messageHandlers.lectragit.postMessage(msg); }
function postProgress(line) {
  if (line) post({ type: "gitProgress", line });
}
function formatProgress(e) {
  if (!e) return "";
  const phase = e.phase || "Working";
  if (e.total) return phase + " " + Math.round(100 * e.loaded / e.total) + "%";
  if (e.loaded) return phase + " " + e.loaded;
  return phase;
}

// ---- base64 <-> bytes -------------------------------------------------------
function bytesToB64(bytes) {
  let bin = "";
  const chunk = 0x8000;
  for (let i = 0; i < bytes.length; i += chunk) {
    bin += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
  }
  return btoa(bin);
}
function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

// ---- fs adapter (bridges to native FileManager) -----------------------------
async function fsCall(op, payload) {
  const reply = await window.webkit.messageHandlers.gitfs.postMessage(Object.assign({ op }, payload));
  if (!reply || reply.ok !== true) {
    const e = new Error((reply && reply.message) || ("fs " + op + " failed"));
    e.code = (reply && reply.code) || "EIO";
    throw e;
  }
  return reply;
}

function makeStat(s) {
  // isomorphic-git derives `type` from the is*() methods, and reads the numeric
  // fields directly. Times come back as milliseconds from Swift.
  const isSym = s.type === "symlink";
  const isDir = s.type === "dir";
  return {
    type: s.type,
    mode: s.mode,
    size: s.size,
    ino: s.ino || 0,
    mtimeMs: s.mtimeMs || 0,
    ctimeMs: s.ctimeMs || s.mtimeMs || 0,
    uid: 1, gid: 1, dev: 1,
    isFile: () => !isDir && !isSym,
    isDirectory: () => isDir,
    isSymbolicLink: () => isSym,
  };
}

const fs = {
  promises: {
    async readFile(filepath, opts) {
      const encoding = typeof opts === "string" ? opts : (opts && opts.encoding);
      const reply = await fsCall("readFile", { path: filepath });
      const bytes = b64ToBytes(reply.dataB64 || "");
      return encoding === "utf8" ? new TextDecoder().decode(bytes) : bytes;
    },
    async writeFile(filepath, data, opts) {
      let bytes;
      if (typeof data === "string") {
        const encoding = typeof opts === "string" ? opts : (opts && opts.encoding);
        bytes = encoding === "hex" ? hexToBytes(data) : new TextEncoder().encode(data);
      } else {
        bytes = data instanceof Uint8Array ? data : new Uint8Array(data);
      }
      const mode = (opts && typeof opts === "object" && opts.mode) ? opts.mode : 0o644;
      await fsCall("writeFile", { path: filepath, dataB64: bytesToB64(bytes), mode });
    },
    async unlink(filepath) { await fsCall("unlink", { path: filepath }); },
    async readdir(filepath) { return (await fsCall("readdir", { path: filepath })).entries; },
    async mkdir(filepath) { await fsCall("mkdir", { path: filepath }); },
    async rmdir(filepath) { await fsCall("rmdir", { path: filepath }); },
    async stat(filepath) { return makeStat(await fsCall("stat", { path: filepath })); },
    async lstat(filepath) { return makeStat(await fsCall("lstat", { path: filepath })); },
    async readlink(filepath) { return (await fsCall("readlink", { path: filepath })).target; },
    async symlink(target, filepath) { await fsCall("symlink", { path: filepath, target }); },
    async chmod() { /* no-op: iOS sandbox has no meaningful unix mode bits */ },
  },
};

function hexToBytes(hex) {
  const out = new Uint8Array(hex.length / 2);
  for (let i = 0; i < out.length; i++) out[i] = parseInt(hex.substr(i * 2, 2), 16);
  return out;
}

// ---- http adapter (bridges to native URLSession; injects GitHub auth) -------
const http = {
  async request({ url, method, headers, body }) {
    let bodyB64 = null;
    if (body) {
      // body is an async iterable of Uint8Array; collect it.
      const chunks = [];
      let total = 0;
      for await (const chunk of body) { chunks.push(chunk); total += chunk.length; }
      const merged = new Uint8Array(total);
      let off = 0;
      for (const c of chunks) { merged.set(c, off); off += c.length; }
      bodyB64 = bytesToB64(merged);
    }
    const reply = await window.webkit.messageHandlers.githttp.postMessage({
      url, method: method || "GET", headers: headers || {}, bodyB64,
    });
    if (!reply || reply.ok !== true) {
      throw new Error((reply && reply.message) || "Network request failed");
    }
    const respBytes = reply.bodyB64 ? b64ToBytes(reply.bodyB64) : new Uint8Array(0);
    return {
      url: reply.url || url,
      method: method || "GET",
      statusCode: reply.statusCode,
      statusMessage: reply.statusMessage || "",
      headers: reply.headers || {},
      body: [respBytes], // one-shot async-iterable
    };
  },
};

// ---- porcelain: parse argv and call isomorphic-git --------------------------
async function readAuthor(dir) {
  const name = (await git.getConfig({ fs, dir, path: "user.name" })) || "Lectra";
  const email = (await git.getConfig({ fs, dir, path: "user.email" })) || "lectra@local";
  return { name, email };
}

// Parse a tiny flag set: returns {flags:Set, opts:{}, positionals:[]}
function parseArgs(args, valueFlags = []) {
  const flags = new Set(), opts = {}, positionals = [];
  for (let i = 0; i < args.length; i++) {
    const a = args[i];
    if (a.startsWith("--") && a.includes("=")) {
      const [k, v] = a.slice(2).split(/=(.*)/s); opts[k] = v;
    } else if (valueFlags.includes(a)) {
      opts[a.replace(/^-+/, "")] = args[++i];
    } else if (a.startsWith("-")) {
      flags.add(a);
    } else {
      positionals.push(a);
    }
  }
  return { flags, opts, positionals };
}

const STATUS_LABELS = {
  // statusMatrix row = [filepath, HEAD, WORKDIR, STAGE]
};

async function gitStatus(dir) {
  const matrix = await git.statusMatrix({ fs, dir });
  const staged = [], unstaged = [], untracked = [];
  for (const [filepath, head, workdir, stage] of matrix) {
    if (head === 0 && workdir === 2 && stage === 0) { untracked.push(filepath); continue; }
    if (head === 0 && stage === 2) staged.push(["new file:   ", filepath]);
    else if (head === 1 && stage === 0) staged.push(["deleted:    ", filepath]);
    else if (head === 1 && stage === 3 && workdir === 1) {} // staged==head no-op
    else if (head === 1 && stage === 2 && workdir === 2) staged.push(["modified:   ", filepath]);
    if (workdir === 0 && head === 1) unstaged.push(["deleted:    ", filepath]);
    else if (workdir === 2 && stage !== 2) unstaged.push(["modified:   ", filepath]);
    else if (workdir === 2 && stage === 2 && head === 1) {} // already counted
  }
  // Report the real HEAD state. currentBranch() returns the branch name for a
  // normal (attached) HEAD — even in a fresh repo with no commits yet — and
  // undefined when HEAD is detached. Telling these apart matters: commits made
  // on a detached HEAD never advance a branch and never push.
  let branch;
  try { branch = await git.currentBranch({ fs, dir, fullname: false }); } catch (e) {}
  let out;
  if (branch) {
    let hasCommit = false;
    try { hasCommit = !!(await git.resolveRef({ fs, dir, ref: branch })); } catch (e) {}
    out = hasCommit ? ("On branch " + branch + "\n")
                    : ("On branch " + branch + "\n\nNo commits yet\n");
  } else {
    let oid = "";
    try { oid = (await git.resolveRef({ fs, dir, ref: "HEAD" })) || ""; } catch (e) {}
    out = oid
      ? ("HEAD detached at " + oid.slice(0, 7) + "\n" +
         "  (commits here won't update any branch — run `git switch -c main` to start one)\n")
      : "On branch main\n\nNo commits yet\n";
  }
  if (staged.length) {
    out += "\nChanges to be committed:\n";
    for (const [label, f] of staged) out += "\t" + label + f + "\n";
  }
  if (unstaged.length) {
    out += "\nChanges not staged for commit:\n";
    for (const [label, f] of unstaged) out += "\t" + label + f + "\n";
  }
  if (untracked.length) {
    out += "\nUntracked files:\n";
    for (const f of untracked) out += "\t" + f + "\n";
  }
  if (!staged.length && !unstaged.length && !untracked.length) out += "\nnothing to commit, working tree clean\n";
  return out;
}

async function gitLog(dir, args) {
  const { opts } = parseArgs(args, []);
  const depth = opts.n ? parseInt(opts.n) : 20;
  const commits = await git.log({ fs, dir, depth });
  let out = "";
  for (const c of commits) {
    const a = c.commit.author;
    const date = new Date(a.timestamp * 1000).toString();
    out += "commit " + c.oid + "\n";
    out += "Author: " + a.name + " <" + a.email + ">\n";
    out += "Date:   " + date + "\n\n";
    out += "    " + c.commit.message.trim().replace(/\n/g, "\n    ") + "\n\n";
  }
  return out || "no commits yet\n";
}

// Add a filepath or glob-ish "." to the index.
async function gitAdd(dir, args) {
  const { positionals } = parseArgs(args, []);
  if (!positionals.length) throw new Error("Nothing specified, nothing added.");
  for (const p of positionals) {
    if (p === "." || p === "-A" || p === "*") {
      await git.add({ fs, dir, filepath: ".", parallel: true });
    } else {
      // Stage deletions too: if missing on disk, use remove.
      try {
        await fsCall("stat", { path: dir.replace(/\/$/, "") + "/" + p });
        await git.add({ fs, dir, filepath: p });
      } catch (e) {
        await git.remove({ fs, dir, filepath: p });
      }
    }
  }
  return "";
}

// One-tap project sync: stage every local change (adds, edits, deletions),
// commit if anything changed, pull remote work, then push — against `origin`.
// Used by the Projects "Sync" button; composes the same primitives the terminal
// exposes so the on-disk repo stays the single source of truth.
async function gitSync(dir, args) {
  const { opts } = parseArgs(args, ["-m", "--message"]);

  let originURL = "";
  try { originURL = (await git.getConfig({ fs, dir, path: "remote.origin.url" })) || ""; } catch (e) {}
  if (!originURL) {
    throw new Error("This project has no 'origin' remote to sync with. Clone it from GitHub or add a remote first.");
  }

  const author = await readAuthor(dir);
  let branch = "main";
  try { branch = (await git.currentBranch({ fs, dir })) || "main"; } catch (e) {}

  // Stage all working-tree changes. statusMatrix rows are
  // [filepath, HEAD, WORKDIR, STAGE]; an unchanged file is [_, 1, 1, 1].
  const matrix = await git.statusMatrix({ fs, dir });
  let changeCount = 0;
  for (const [filepath, head, workdir, stage] of matrix) {
    if (head === 1 && workdir === 1 && stage === 1) continue; // unchanged
    if (workdir === 0) {
      await git.remove({ fs, dir, filepath }); // deleted on disk -> stage removal
    } else {
      await git.add({ fs, dir, filepath });    // new or modified -> stage
    }
    changeCount++;
  }

  let committed = false;
  if (changeCount > 0) {
    const message = opts.m || opts.message || ("Sync from Lectra " + new Date().toISOString());
    await git.commit({ fs, dir, message, author });
    committed = true;
  }

  postProgress("Pulling from origin...");
  try {
    await git.pull({ fs, http, dir, author, singleBranch: false,
      onProgress: (e) => postProgress(formatProgress(e)) });
  } catch (err) {
    const m = err && err.message ? err.message : String(err);
    if (/conflict/i.test(m) || (err && err.code === "MergeConflictError")) {
      throw new Error("Sync paused: changes on GitHub conflict with local edits. Resolve them in the terminal (git status), then sync again.");
    }
    throw new Error("Couldn't pull from origin: " + m);
  }

  postProgress("Pushing " + branch + " to origin...");
  let result;
  try {
    result = await git.push({ fs, http, dir, remote: "origin", ref: branch,
      onProgress: (e) => postProgress(formatProgress(e)) });
  } catch (err) {
    const m = err && err.message ? err.message : String(err);
    if (m.includes("HTTP Error: 404")) {
      throw new Error("GitHub returned 404 for " + originURL + ". Reconnect GitHub or use a token with write access to this repo.");
    }
    throw err;
  }
  if (result && result.ok === false && result.error) throw new Error(result.error);

  const head = committed
    ? ("Committed " + changeCount + " file" + (changeCount === 1 ? "" : "s"))
    : "No local changes";
  return head + " — synced with origin/" + branch + ".\n";
}

async function runGit(argv, dir) {
  const [sub, ...rest] = argv;
  switch (sub) {
    case "init": {
      const { opts } = parseArgs(rest, []);
      await git.init({ fs, dir, defaultBranch: opts.b || "main" });
      return "Initialized empty Git repository in " + dir + "/.git/\n";
    }
    case "add": return await gitAdd(dir, rest);
    case "sync": return await gitSync(dir, rest);
    case "rm": {
      const { positionals } = parseArgs(rest, []);
      for (const p of positionals) { await git.remove({ fs, dir, filepath: p }); await fsCall("unlink", { path: dir.replace(/\/$/, "") + "/" + p }).catch(() => {}); }
      return positionals.map(p => "rm '" + p + "'").join("\n") + "\n";
    }
    case "status": return await gitStatus(dir);
    case "commit": {
      const { opts } = parseArgs(rest, ["-m", "--message"]);
      const message = opts.m || opts.message;
      if (!message) throw new Error("Aborting commit due to empty commit message (use -m).");
      const author = await readAuthor(dir);
      const oid = await git.commit({ fs, dir, message, author });
      let branch;
      try { branch = await git.currentBranch({ fs, dir }); } catch (e) {}
      const subject = message.split("\n")[0];
      if (!branch) {
        // Detached HEAD: the commit is real but not on any branch, so it won't
        // push. Say so loudly rather than printing a normal-looking line.
        return "[detached HEAD " + oid.slice(0, 7) + "] " + subject + "\n" +
               "  warning: this commit is not on a branch and won't push.\n" +
               "  Keep it on a branch with `git switch -c main`.\n";
      }
      return "[" + branch + " " + oid.slice(0, 7) + "] " + subject + "\n";
    }
    case "log": return await gitLog(dir, rest);
    case "branch": {
      const { positionals, flags } = parseArgs(rest, []);
      if (flags.has("-d") || flags.has("-D")) {
        for (const b of positionals) await git.deleteBranch({ fs, dir, ref: b });
        return "";
      }
      if (positionals.length) { await git.branch({ fs, dir, ref: positionals[0] }); return ""; }
      const branches = await git.listBranches({ fs, dir });
      let current = ""; try { current = await git.currentBranch({ fs, dir }) || ""; } catch (e) {}
      return branches.map(b => (b === current ? "* " : "  ") + b).join("\n") + "\n";
    }
    case "restore": {
      // git restore [--staged] [--worktree] [--source=<tree>] <pathspec...>
      // Brings files back to the working tree (recreating deletions) and/or
      // unstages them. With no flag, the working tree is restored from HEAD.
      const { positionals, flags, opts } = parseArgs(rest, ["-s", "--source"]);
      if (!positionals.length) throw new Error("you must specify path(s) to restore");
      const staged = flags.has("--staged") || flags.has("-S");
      const worktree = flags.has("--worktree") || flags.has("-W");
      const source = opts.source || opts.s || "HEAD";
      const doWorktree = worktree || !staged; // default target is the worktree
      for (const p of positionals) {
        if (staged) {
          // Unstage: reset this path's index entry back to HEAD.
          await git.resetIndex({ fs, dir, filepath: p });
        }
        if (doWorktree) {
          // Recreate/overwrite the working-tree file from `source` (HEAD default).
          await git.checkout({ fs, dir, ref: source, filepaths: [p], force: true });
        }
      }
      return "";
    }
    case "checkout": {
      const { positionals, flags } = parseArgs(rest, []);
      const ref = positionals[0];
      if (flags.has("-b")) { await git.branch({ fs, dir, ref, checkout: true }); return "Switched to a new branch '" + ref + "'\n"; }
      await git.checkout({ fs, dir, ref });
      return "Switched to branch '" + ref + "'\n";
    }
    case "switch": {
      const { positionals, flags } = parseArgs(rest, ["-c"]);
      const ref = positionals[0] || rest[rest.indexOf("-c") + 1];
      if (flags.has("-c") || rest.includes("-c")) { await git.branch({ fs, dir, ref, checkout: true }); return "Switched to a new branch '" + ref + "'\n"; }
      await git.checkout({ fs, dir, ref });
      return "Switched to branch '" + ref + "'\n";
    }
    case "clone": {
      const { positionals, opts } = parseArgs(rest, ["--depth", "-b", "--branch"]);
      const url = positionals[0];
      if (!url) throw new Error("You must specify a repository to clone.");
      const target = positionals[1] || (url.split("/").pop() || "repo").replace(/\.git$/, "");
      const cloneDir = dir.replace(/\/$/, "") + "/" + target;
      await fsCall("mkdir", { path: cloneDir }).catch(() => {});
      postProgress("Cloning into '" + target + "'...");
      const args = { fs, http, dir: cloneDir, url, singleBranch: false,
        onProgress: (e) => postProgress(formatProgress(e)) };
      if (opts.depth) args.depth = parseInt(opts.depth);
      if (opts.b || opts.branch) { args.ref = opts.b || opts.branch; args.singleBranch = true; }
      await git.clone(args);
      return "Cloning into '" + target + "'...\ndone.\n";
    }
    case "fetch": {
      const remote = rest[0] || "origin";
      postProgress("Fetching " + remote + "...");
      await git.fetch({ fs, http, dir, remote, singleBranch: false,
        onProgress: (e) => postProgress(formatProgress(e)) });
      return "";
    }
    case "pull": {
      const author = await readAuthor(dir);
      postProgress("Pulling from origin...");
      await git.pull({ fs, http, dir, author, singleBranch: false,
        onProgress: (e) => postProgress(formatProgress(e)) });
      return "Already up to date.\n";
    }
    case "push": {
      const { positionals, flags } = parseArgs(rest, []);
      const remote = positionals[0] || "origin";
      // Resolve which branch to push. A detached HEAD has no branch, so falling
      // back to "main" would silently push a stale branch while the user's real
      // commit sits on the orphaned HEAD — exactly the "push did nothing" trap.
      let ref = positionals[1];
      if (!ref) {
        try { ref = await git.currentBranch({ fs, dir }); } catch (e) {}
        if (!ref) {
          throw new Error(
            "You are in 'detached HEAD' state, so there is no branch to push.\n" +
            "Start a branch from where you are: `git switch -c main`, then `git push`."
          );
        }
      }
      // Make sure the branch actually points at a commit. Pushing a branch with
      // no commits is a no-op that some servers accept silently; surface it.
      let head = "";
      try { head = (await git.resolveRef({ fs, dir, ref })) || ""; } catch (e) {}
      if (!head) {
        throw new Error(
          "nothing to push: branch '" + ref + "' has no commits yet.\n" +
          "Stage and commit first: `git add .` then `git commit -m \"your message\"`."
        );
      }
      postProgress("Pushing " + ref + " to " + remote + "...");
      let result;
      try {
        result = await git.push({ fs, http, dir, remote, ref, force: flags.has("-f") || flags.has("--force"),
          onProgress: (e) => postProgress(formatProgress(e)) });
      } catch (err) {
        let remoteURL = "";
        try { remoteURL = await git.getConfig({ fs, dir, path: "remote." + remote + ".url" }) || ""; } catch (e) {}
        const message = err && err.message ? err.message : String(err);
        if (message.includes("HTTP Error: 404")) {
          throw new Error(
            "GitHub returned 404 for " + (remoteURL || remote) + ".\n" +
            "Check `git remote -v`. If the URL is correct, reconnect GitHub or use a token with repo write access."
          );
        }
        throw err;
      }
      if (result.ok) return "To " + (result.url || remote) + "\n   " + ref + " -> " + ref + "\n";
      throw new Error((result.error) || "push rejected");
    }
    case "remote": {
      const { positionals } = parseArgs(rest, []);
      if (positionals[0] === "add") {
        if (!positionals[1] || !positionals[2]) throw new Error("usage: git remote add <name> <url>");
        await git.addRemote({ fs, dir, remote: positionals[1], url: positionals[2] });
        return "";
      }
      if (positionals[0] === "set-url") {
        const remote = positionals[1];
        const url = positionals[2];
        if (!remote || !url) throw new Error("usage: git remote set-url <name> <newurl>");
        const current = await git.getConfig({ fs, dir, path: "remote." + remote + ".url" });
        if (!current) throw new Error("No such remote '" + remote + "'");
        await git.setConfig({ fs, dir, path: "remote." + remote + ".url", value: url });
        return "";
      }
      if (positionals[0] === "get-url") {
        const remote = positionals[1] || "origin";
        const url = await git.getConfig({ fs, dir, path: "remote." + remote + ".url" });
        if (!url) throw new Error("No such remote '" + remote + "'");
        return url + "\n";
      }
      if (positionals[0] === "remove" || positionals[0] === "rm") {
        if (!positionals[1]) throw new Error("usage: git remote remove <name>");
        await git.deleteRemote({ fs, dir, remote: positionals[1] });
        return "";
      }
      if (positionals[0] && positionals[0] !== "-v") {
        throw new Error("git remote " + positionals[0] + " is not supported.");
      }
      const remotes = await git.listRemotes({ fs, dir });
      if (rest.includes("-v")) return remotes.map(r => r.remote + "\t" + r.url + " (fetch)\n" + r.remote + "\t" + r.url + " (push)").join("\n") + "\n";
      return remotes.map(r => r.remote).join("\n") + "\n";
    }
    case "config": {
      const { positionals } = parseArgs(rest, []);
      if (positionals.length >= 2) { await git.setConfig({ fs, dir, path: positionals[0], value: positionals.slice(1).join(" ") }); return ""; }
      if (positionals.length === 1) { return ((await git.getConfig({ fs, dir, path: positionals[0] })) || "") + "\n"; }
      return "";
    }
    case "diff": {
      // Lightweight: list changed files (name + status), not full unified diff.
      const matrix = await git.statusMatrix({ fs, dir });
      let out = "";
      for (const [filepath, head, workdir, stage] of matrix) {
        if (head !== workdir || head !== stage) {
          const tag = head === 0 ? "A" : workdir === 0 ? "D" : "M";
          out += tag + "\t" + filepath + "\n";
        }
      }
      return out;
    }
    case "rev-parse": {
      const { positionals } = parseArgs(rest, []);
      const ref = positionals[0] || "HEAD";
      return (await git.resolveRef({ fs, dir, ref })) + "\n";
    }
    case "version": case "--version":
      return "git version 1.0.0 (lectra/isomorphic-git)\n";
    default:
      throw new Error("git: '" + sub + "' is not supported in Lectra's terminal.");
  }
}

// ---- entry point driven from Swift ------------------------------------------
window.lectraGit = function (reqID, argvJSON, cwd) {
  let argv;
  try { argv = JSON.parse(argvJSON); } catch (e) { argv = []; }
  // dir is the working tree root; isomorphic-git wants an absolute path.
  const dir = cwd;
  (async () => {
    try {
      const stdout = await runGit(argv, dir);
      post({ type: "gitResult", reqID, exitCode: 0, stdout: stdout || "", stderr: "" });
    } catch (err) {
      post({ type: "gitResult", reqID, exitCode: 1, stdout: "",
             stderr: (err && err.message ? err.message : String(err)) + "\n" });
    }
  })();
};

post({ type: "ready" });
</script>
